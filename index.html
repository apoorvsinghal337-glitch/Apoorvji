<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mummy</title>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Playfair Display', serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .phase { display: none; text-align: center; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #p1 { display: flex; }
        
        /* Phase 1: Gravity Portal */
        .ring-container { position: relative; width: 150px; height: 150px; cursor: pointer; }
        .ring { width: 100%; height: 100%; border: 2px solid gold; border-radius: 50%; animation: rotate 4s linear infinite; }
        .particles { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: gold; border-radius: 50%; box-shadow: 0 0 20px gold; animation: orbit 2s infinite linear; }
        @keyframes orbit { 0% { transform: rotate(0deg) translateX(80px); } 100% { transform: rotate(360deg) translateX(80px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .dissolve { animation: dissolve 1.5s forwards; }
        @keyframes dissolve { 100% { transform: scale(5); opacity: 0; filter: blur(50px); } }

        /* Phase 2: Live Glow */
        #msg { font-size: 2rem; margin: 0 20px; line-height: 1.6; animation: live-glow 2s infinite alternate; }
        @keyframes live-glow { from { text-shadow: 0 0 5px gold; } to { text-shadow: 0 0 25px gold; } }
        
        /* Phase 3: Magical Butterflies */
        .butterfly { position: absolute; font-size: 25px; filter: drop-shadow(0 0 5px gold); animation: flutter 8s infinite linear; pointer-events: none; }
        @keyframes flutter { 0% { transform: translate(-50px, 100vh) rotate(0deg); } 100% { transform: translate(100vw, -100px) rotate(360deg); } }
        #p3 h1 { animation: breathe 3s ease-in-out infinite; text-shadow: 0 0 20px gold; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="p1" class="phase">
        <div class="ring-container" onclick="startCinematic(this)">
            <div class="ring"></div>
            <div class="particles"></div>
        </div>
        <p style="margin-top: 30px; letter-spacing: 2px;">Touch to Open</p>
    </div>

    <div id="p2" class="phase">
        <h1 id="msg"></h1>
        <button onclick="next(3)" style="background:transparent; color:gold; border:1px solid gold; padding:15px 30px; cursor:pointer; margin-top:30px; border-radius:50px;">Aage Badhein</button>
    </div>

    <div id="p3" class="phase">
        <h1>Happy Birthday, Mummy!</h1>
        <div id="butterflies"></div>
    </div>

    <audio id="bgMusic" src="https://www.image2url.com/r2/default/audio/1781853657216-ca846192-2e19-4cd5-aec1-4b69f13bc8e3.mp3" loop></audio>

    <script>
        function startCinematic(el) {
            el.classList.add('dissolve');
            setTimeout(() => next(2), 1000);
        }

        function next(step) {
            document.querySelectorAll('.phase').forEach(p => p.style.display = 'none');
            document.getElementById('p' + step).style.display = 'flex';
            if(step === 2) {
                document.getElementById('bgMusic').play();
                liveType("Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya...", 0);
            }
            if(step === 3) spawnButterflies();
        }

        function liveType(text, i) {
            if (i < text.length) {
                document.getElementById('msg').innerHTML = text.substring(0, i+1) + '<span style="border-right: 2px solid gold; animation: blink 0.7s infinite;"></span>';
                i++;
                setTimeout(() => liveType(text, i), 80);
            }
        }

        function spawnButterflies() {
            const container = document.getElementById('butterflies');
            for(let i=0; i<15; i++) {
                let b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = '🦋';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.top = Math.random() * 100 + 'vh';
                b.style.animationDuration = (Math.random() * 5 + 5) + 's';
                b.style.animationDelay = (i * 0.5) + 's';
                container.appendChild(b);
            }
        }
    </script>
    <style>@keyframes blink { 50% { opacity: 0; } }</style>
</body>
</html>
