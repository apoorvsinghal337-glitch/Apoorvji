<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Playfair Display', serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #overlay { position: absolute; z-index: 10; text-align: center; transition: opacity 1s; }
        button { background: transparent; border: 2px solid #FFD700; color: #FFD700; padding: 20px 40px; font-size: 20px; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        button:hover { background: #FFD700; color: #000; box-shadow: 0 0 20px #FFD700; }
        #message { display: none; font-size: 28px; max-width: 700px; text-shadow: 0 0 10px #FFD700; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="start-screen">
            <h1 style="font-size: 50px;">Mummy ke liye ek khaas tohfa...</h1>
            <button onclick="initSurprise()">Open Surprise</button>
        </div>
        <div id="message"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let particles = [];
        function initSurprise() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            typeWriter("Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya. Meri har mushkil ka hal aur har khushi ki wajah sirf aap hain. Janmdin Mubarak, Mummy!", 0);
            animateFireworks();
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById('message').innerHTML += text.charAt(i);
                i++;
                setTimeout(() => typeWriter(text, i), 80);
            }
        }

        function animateFireworks() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Gold particle effect
            if(Math.random() < 0.1) {
                particles.push({x: Math.random()*canvas.width, y: canvas.height, size: Math.random()*3, color: '#FFD700'});
            }
            particles.forEach((p, index) => {
                p.y -= 2;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if(p.y < 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animateFireworks);
        }
    </script>
</body>
</html>
