<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Playfair Display', serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .phase { display: none; text-align: center; }
        #p1 { display: block; }
        
        /* Phase 1: Rotating Ring */
        .ring { width: 150px; height: 150px; border: 4px solid #FFD700; border-radius: 50%; animation: rotate 2s linear infinite; cursor: pointer; transition: 0.5s; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .expand-anim { animation: expand 1s forwards; }
        @keyframes expand { 100% { transform: scale(50); opacity: 0; } }

        /* Phase 3: Fireworks */
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        h1 { font-size: 3.5rem; text-shadow: 0 0 30px #FFD700; }
    </style>
</head>
<body>

    <div id="p1" class="phase">
        <div class="ring" onclick="startPortal(this)"></div>
        <p>Click the Ring</p>
    </div>

    <div id="p2" class="phase">
        <h1 id="msg"></h1>
        <button onclick="next(3)" style="padding:15px 30px; background:transparent; color:#FFD700; border:1px solid #FFD700; cursor:pointer;">Continue</button>
    </div>

    <div id="p3" class="phase">
        <h1>Happy Birthday, Mummy!</h1>
        <canvas id="fireworksCanvas"></canvas>
    </div>

    <audio id="bgMusic" src="https://www.image2url.com/r2/default/audio/1781853657216-ca846192-2e19-4cd5-aec1-4b69f13bc8e3.mp3" loop></audio>

    <script>
        function startPortal(el) {
            el.classList.add('expand-anim');
            setTimeout(() => next(2), 800);
        }

        function next(step) {
            document.querySelectorAll('.phase').forEach(p => p.style.display = 'none');
            document.getElementById('p' + step).style.display = 'block';
            if(step === 2) {
                document.getElementById('bgMusic').play();
                type("Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya...", 0);
            }
            if(step === 3) startFireworks();
        }

        function type(text, i) {
            if (i < text.length) {
                document.getElementById('msg').innerHTML += text.charAt(i);
                setTimeout(() => type(text, i+1), 70);
            }
        }

        function startFireworks() {
            const canvas = document.getElementById('fireworksCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            
            setInterval(() => {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                for(let i=0; i<30; i++) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }, 500);
        }
    </script>
</body>
</html>
