<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #000; font-family: 'Georgia', serif; overflow: hidden; }
        #overlay { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #000; z-index: 10; }
        button { border: 2px solid #FFD700; background: transparent; color: #FFD700; padding: 20px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; }
        
        #message { position: absolute; top: 20%; width: 80%; text-align: center; color: #FFD700; font-size: 26px; line-height: 1.5; opacity: 0; transition: opacity 1s; }
        
        .particle { position: absolute; color: #FFD700; font-size: 20px; animation: float 10s infinite; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="start()">Open Surprise</button>
    </div>

    <div id="message"></div>
    <audio id="bgMusic" src="https://www.image2url.com/r2/default/audio/1781853657216-ca846192-2e19-4cd5-aec1-4b69f13bc8e3.mp3" loop></audio>

    <script>
        const fullText = "Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya. Meri har mushkil ka hal aur har khushi ki wajah sirf aap hain. Aapka har din waisa hi khubsurat ho jaisa aapka dil hai. Janmdin Mubarak, Mummy!";
        
        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('bgMusic').play();
            document.getElementById('message').style.opacity = '1';
            
            // Typewriter effect
            let i = 0;
            function type() {
                if (i < fullText.length) {
                    document.getElementById('message').innerHTML += fullText.charAt(i);
                    i++;
                    setTimeout(type, 80);
                }
            }
            type();
            
            // Create Floating Stars
            for(let j=0; j<15; j++) {
                let star = document.createElement('div');
                star.className = 'particle';
                star.innerHTML = '✨';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(star);
            }
        }
    </script>
</body>
</html>
