
<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle, #ff9a9e, #fecfef);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Dancing Script', cursive;
            text-align: center;
            overflow: hidden;
        }
        h1 { font-size: 3.5rem; color: #d63384; text-shadow: 2px 2px 4px #fff; }
        .buttons { display: flex; gap: 20px; margin-top: 20px; }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        #yes { background: #ff4d6d; color: white; }
        #no { background: #333; color: white; position: absolute; }
    </style>
</head>
<body>
    <h1>Will you be my Valentine? ❤️</h1>
    <div class="buttons">
        <button id="yes" onclick="alert('I knew it! Love you forever! 💖')">Yes</button>
        <button id="no" onmouseover="moveNo()">No</button>
    </div>

    <script>
        function moveNo() {
            const btn = document.getElementById('no');
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }
    </script>
</body>
</html>
