<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Mummy</title>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Georgia', serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; text-align: center; }
        .phase { width: 100%; display: none; }
        #p1 { display: block; cursor: pointer; }

        /* Rotating Ring Phase 1 */
        .ring { width: 200px; height: 200px; border: 5px solid transparent; border-top: 5px solid gold; border-radius: 50%; animation: rotate 2s linear infinite; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Golden Firework Particles Phase 3 */
        .firework { position: absolute; font-size: 25px; animation: explode 1s ease-out forwards; }
        @keyframes explode { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Yahan apna direct music URL daalein -->
    <audio id="myMusic" loop>
        <source src="YAHAN_APNA_MUSIC_LINK_DAALEIN.mp3" type="audio/mpeg">
    </audio>

    <!-- Phase 1: Rotating Ring -->
    <div id="p1" class="phase" onclick="startExperience()">
        <div class="ring">🪔</div>
        <p style="margin-top: 20px;">Touch the Ring for Blessings</p>
    </div>

    <!-- Phase 2: Typewriter -->
    <div id="p2" class="phase">
        <h1 id="typewriter" style="font-size: 2rem; padding: 20px; height: 150px;"></h1>
        <button id="nextBtn" onclick="showFinale()" style="display:none; background:transparent; color:gold; border:2px solid gold; padding:15px; cursor:pointer;">Celebration Start</button>
    </div>

    <!-- Phase 3: Golden Firecrackers -->
    <div id="p3" class="phase">
        <h1 style="font-size: 3.5rem; text-shadow: 0 0 40px gold;">HAPPY BIRTHDAY, MUMMY!</h1>
    </div>

    <script>
        const msg = "Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya.";
        let i = 0;

        function startExperience() {
            document.getElementById('myMusic').play(); // Music yahan start hoga
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'block';
            type();
        }

        function type() {
            if (i < msg.length) {
                document.getElementById("typewriter").innerHTML += msg.charAt(i);
                i++;
                setTimeout(type, 80);
            } else {
                document.getElementById("nextBtn").style.display = "inline-block";
            }
        }

        function showFinale() {
            document.getElementById('p2').style.display = 'none';
            document.getElementById('p3').style.display = 'block';
            // Golden Firecrackers
            setInterval(() => {
                let f = document.createElement('div');
                f.innerHTML = '💥';
                f.className = 'firework';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 1000);
            }, 300);
        }
    </script>
</body>
</html>
