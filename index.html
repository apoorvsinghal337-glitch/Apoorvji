<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Playfair Display', serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .phase { display: none; text-align: center; }
        #p1 { display: block; }
        
        /* Phase 1: Gentle Dissolve */
        .ring { width: 120px; height: 120px; border: 3px solid #FFD700; border-radius: 50%; animation: rotate 3s linear infinite; cursor: pointer; transition: 1s; }
        .dissolve { opacity: 0; transform: scale(1.5); }

        /* Phase 2: Breathing Glow */
        #p2 { animation: breathe 4s infinite alternate; }
        @keyframes breathe { from { text-shadow: 0 0 5px #444; } to { text-shadow: 0 0 20px #FFD700; } }

        /* Phase 3: Golden Rain Canvas */
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="p1" class="phase">
        <div class="ring" onclick="dissolve(this)"></div>
        <p>Ek chhota sa surprise...</p>
    </div>

    <div id="p2" class="phase">
        <h1 id="msg"></h1>
        <button onclick="next(3)" style="background:none; border:1px solid #FFD700; color:#FFD700; padding:10px 20px; margin-top:20px;">Aage Badhein</button>
    </div>

    <div id="p3" class="phase">
        <h1 style="font-size: 3rem;">Happy Birthday, Mummy!</h1>
        <canvas id="rainCanvas"></canvas>
    </div>

    <audio id="bgMusic" src="https://www.image2url.com/r2/default/audio/1781853657216-ca846192-2e19-4cd5-aec1-4b69f13bc8e3.mp3" loop></audio>

    <script>
        function dissolve(el) {
            el.classList.add('dissolve');
            setTimeout(() => next(2), 1000);
        }

        function next(step) {
            document.querySelectorAll('.phase').forEach(p => p.style.display = 'none');
            document.getElementById('p' + step).style.display = 'block';
            if(step === 2) {
                document.getElementById('bgMusic').play();
                type("Log kehte hain bhagwan har jagah nahi ho sakte, isliye unhone 'Mummy' ko banaya...", 0);
            }
            if(step === 3) startRain();
        }

        function type(text, i) {
            if (i < text.length) {
                document.getElementById('msg').innerHTML += text.charAt(i);
                setTimeout(() => type(text, i+1), 70);
            }
        }

        function startRain() {
            const canvas = document.getElementById('rainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
                particles.push({x: Math.random()*canvas.width, y: 0, speed: Math.random()*2+1});
                particles.forEach(p => {
                    p.y += p.speed;
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(p.x, p.y, 2, 10);
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
